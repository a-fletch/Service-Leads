<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Become a Provider | www.ProHive.us</title>

<style>
  main { max-width: 1000px; margin: 40px auto; padding: 20px; background: #f7f7f7; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  body { font-family: Arial, sans-serif; background: #f7f7f7; color: #333; margin: 0; }

  header {
    height: 400px;
    background-image: url("images/prohive_logo.png");
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #0b141d;
  }

  .menu-bar {
    background-color: #0b141d;
    text-align: center;
  }

  .menu-bar > ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
  }

  .menu-bar li { margin: 0 15px; }

  .menu-bar a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    padding: 15px 10px;
    display: block;
  }

  .menu-bar a:hover { color: #2ab0b0; }

  section { padding: 70px 20px; text-align: center; }

  section + section::before {
    content: "";
    display: block;
    width: 90%;
    max-width: 800px;
    height: 3px;
    background: #2ab0b0;
    margin: 0 auto 40px;
    border-radius: 3px;
  }

  .hero { background: white; }

  .hero h1 {
    font-size: 2.3rem;
    margin-bottom: 20px;
    color: #0b141d;
  }

  .hero p {
    max-width: 700px;
    margin: 0 auto;
    font-size: 1.05rem;
    color: #555;
  }

  .content-card {
    background: white;
    padding: 40px 45px;
    border-radius: 8px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    max-width: 760px;
    margin: 45px auto 0;
    border-left: 6px solid #2ab0b0;
    text-align: left;
  }

  .content-card label {
    font-weight: bold;
    display: block;
    margin-top: 20px;
  }

  .content-card input,
  .content-card select,
  .content-card textarea {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 1rem;
    box-sizing: border-box;
  }

  .content-card input:focus,
  .content-card select:focus,
  .content-card textarea:focus {
    outline: none;
    border-color: #2ab0b0;
    box-shadow: 0 0 0 3px rgba(42,176,176,0.25);
  }

  .content-card textarea {
    min-height: 120px;
    resize: vertical;
  }

  .submit-btn {
    margin-top: 25px;
    background: #2ab0b0;
    color: white;
    border: none;
    padding: 14px 22px;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .submit-btn:hover {
    background: #239696;
  }

  footer {
    text-align: center;
    padding: 40px 20px;
    font-size: 0.9rem;
    color: #777;
  }

  @media (max-width:768px){
    .menu-bar > ul {
    justify-content: space-around;
    flex-wrap: nowrap;
    padding: 0 10px;
    }
    .menu-bar li { margin:0 }
    .menu-bar a {
    padding:12px 8px;
    font-size:0.95rem;
    }

    .content-card {
    padding: 25px 18px;
    margin: 30px auto 0;
  }
}
  }
</style>
</head>

<body>

<header></header>

<nav class="menu-bar">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="index.html#services">Services</a></li>
<li><a href="about.html">About</a></li>
<li><a href="join.html">Join Us</a></li>
</ul>
</nav>

<main>

  <section class="hero">
    <h1>Become a ProHive Service Provider</h1>
    <p>
    Join the ProHive network and connect with customers actively looking
    for reliable professionals in their area.
    </p>
  </section>

  <section>
    <h2>Provider Application</h2>

    <div class="content-card">

      <form id="leadform">

        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required>

        <label>Business Name</label>
        <input type="text" name="business">

        <label>Email Address</label>
        <input type="email" name="email" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <label>Service Category</label>
        <select name="service" required>
        <option value="">Select a service</option>
        <option value="Mobile RV Services">Mobile RV Services</option>
        <option value="Home Cleaning">Home Cleaning</option>
        <option value="Office Cleaning">Office Cleaning</option>
        <option value="Flooring">Flooring</option>
        <option value="Roofing">Roofing</option>
        <option value="Mobile Detailing">Mobile Detailing</option>
        <option value="Painting">Painting</option>
        <option value="Handyman">Handyman</option>
        <option value="Tree Services">Tree Services</option>
        <option value="Landscaping">Landscaping</option>
        <option value="Other">Other</option>
        </select>

        <label>Service Area (City or ZIP)</label>
        <input type="text" name="service_area" required>

        <label>Years of Experience</label>
        <select name="experience">
        <option>Less than 1 year</option>
        <option>1-3 years</option>
        <option>3-5 years</option>
        <option>5+ years</option>
        </select>

        <label>Tell us about your services</label>
        <textarea name="details"></textarea>

        <button class="submit-btn" type="submit">Apply to Join</button>

      </form>
    </div>
  </section>
</main>

<footer>© 2026 ProHive Services, LLC. All rights reserved.</footer>

<script>
    document.getElementById("leadform").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
    
      try {
        const response = await fetch("APP_SCRIPT_ENDPOINT", {
          method: "POST",
          body: formData
        });
    
        if (response.ok) {
          window.location.href = "thank_you.html";
        } else {
          alert("Error submitting form. Please try again.");
        }
      } catch (error) {
        console.error(error);
        alert("Error submitting form. Please try again.");
      }
    });
</script>

</body>
</html>

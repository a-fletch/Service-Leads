<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>www.ProHive.us/rv_windows</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
  color: #333;
}

/* Header */
header {
  height: 400px;
  background-image: url("images/prohive_logo.png");
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  background-color: #0b141d;
}

/* Navigation */
.menu-bar {
  background-color: #0b141d;
  text-align: center;
}

.menu-bar > ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
}

.menu-bar li {
  margin: 0 18px;
}

.menu-bar a {
  text-decoration: none;
  color: white;
  font-weight: 600;
  padding: 15px 10px;
  display: block;
  transition: 0.3s ease;
}

.menu-bar a:hover {
  color: #2ab0b0;
}

/* Split Layout */
.page-container {
  display: flex;
  min-height: calc(100vh - 240px);
}

/* Image Side */
.image-side {
  flex: 1;
  background-image: url("images/rv_windows.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Form Side */
.form-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 50px 40px;
  background: #ffffff;
}

/* Form Card */
.form-wrapper {
  width: 100%;
  max-width: 500px;
}

/* Headline Section */
.hero-text {
  margin-bottom: 25px;
}

.hero-text h1 {
  font-size: 1.9rem;
  margin: 0 0 10px;
  color: #0b141d;
  line-height: 1.2;
}

.hero-text p {
  font-size: 1rem;
  color: #555;
  margin: 0;
  line-height: 1.5;
}

/* Section Titles */
.form-section {
  display: block;
  text-align: left;
  font-weight: 700;
  font-size: 1.2rem;
  margin: 30px 0 15px;
  padding-bottom: 6px;
  border-bottom: 2px solid #2ab0b0;
  color: #0b141d;
}

/* Labels */
form label {
  display: block;
  margin: 16px 0 6px;
  font-weight: 500;
  font-size: 0.95rem;
  color: #0b141d;
}

/* Inputs */
form input,
form select,
form textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 1rem;
  background: #fafafa;
  transition: all 0.25s ease;
}

form input:focus,
form select:focus,
form textarea:focus {
  outline: none;
  border-color: #2ab0b0;
  box-shadow: 0 0 0 3px rgba(42,176,176,0.15);
  background: #ffffff;
}

/* Button */
form button {
  margin-top: 30px;
  width: 100%;
  padding: 15px;
  font-size: 1.1rem;
  font-weight: 600;
  background: #2ab0b0;
  color: #ffffff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
}

form button:hover {
  background: #238e8e;
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* Trust Text */
.trust {
  margin-top: 25px;
  text-align: center;
  font-size: 0.9rem;
  color: #666;
}

/* Responsive */
@media (max-width: 900px) {
  .page-container {
    flex-direction: column;
  }

  .image-side {
    height: 280px;
  }

  .form-side {
    padding: 40px 25px;
  }
}
</style>
</head>

<body>

<header></header>

<nav class="menu-bar">
  <ul>
    <li><a href="index.html">Home</a></li>  
    <li><a href="index.html#services">Services</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="join.html">Join Us</a></li>
  </ul>
</nav>

<div class="page-container">

  <!-- Image Column -->
  <div class="image-side"></div>

  <!-- Form Column -->
  <div class="form-side">
    <div class="form-wrapper">

      <!-- Headline & Subheadline -->
      <div class="hero-text">
        <h1>Expert RV Window Repairs & Replacements</h1>
        <p>Get reliable, licensed technicians to repair or replace your RV windows quickly and efficiently. Quality service, transparent pricing, and peace of mind guaranteed.</p>
      </div>

      <form id="leadform">

        <label for="contactInfo" class="form-section">Contact Information:</label>
        
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required>

        <label for="email">Email</label>
        <input type="text" id="email" name="email" required>

        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" required>

        <label for="vehicleInfo" class="form-section">Vehicle Information:</label>
        
        <label for="vehicleType">Type</label>
        <select id="vehicleType" name="vehicleType" required>
            <option value="">Select</option>
            <option value="Class A">Class A</option>
            <option value="Class B">Class B</option>
            <option value="Class C">Class C</option>
            <option value="Travel Trailer">Travel Trailer</option>
            <option value="Fifth Wheel">Fifth Wheel</option>
            <option value="Toy Hauler">Toy Hauler</option>
            <option value="Pop Up Camper">Pop Up Camper</option>
            <option value="Truck Camper">Truck Camper</option>
            <option value="Park Model">Park Model</option>
        </select>    

        <label for="vehicleYear">Year</label>
        <select id="vehicleYear" name="vehicleYear" required>
            <option value="">Select</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
            <option value="2018">2018</option>
            <option value="2017">2017</option>
            <option value="2016">2016</option>
            <option value="2015">2015</option>
            <option value="2014">2014</option>
            <option value="2013">2013</option>
            <option value="2012">2012</option>
            <option value="2011">2011</option>
            <option value="2010">2010</option>
            <option value="2009">2009</option>
            <option value="2008">2008</option>
            <option value="2007">2007</option>
            <option value="2006">2006</option>
            <option value="2005">2005</option>
            <option value="2004">2004</option>
            <option value="2003">2003</option>
            <option value="2002">2002</option>
            <option value="2001">2001</option>
            <option value="2000">2000</option>
            <option value="1999">1999</option>
            <option value="1998">1998</option>
            <option value="1997">1997</option>
            <option value="1996">1996</option>
            <option value="1995">1995</option>
            <option value="1994">1994</option>
            <option value="1993">1993</option>
            <option value="1992">1992</option>
            <option value="1991">1991</option>
            <option value="1990">1990</option>
            <option value="Other">Other</option>
        </select>

        <label for="vehicleMake">Make</label>
         <input type="text" id="vehicleMake" name="vehicleMake" required>
        </select>

        <label for="vehicleModel">Model</label>
        <input type="text" id="vehicleModel" name="vehicleModel" required>

        <label for="windowInfo" class="form-section">Window Information:</label>
        
        <label for="numOfWindows">Number of Windows Needing Repair</label>
        <select id="numOfWindows" name="numOfWindows" required>
            <option value="">Select</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
        </select>

        <label for="driverWindow">Is One a Driver Window?</label>
        <select id="driverWindow" name="driverWindow" required>
            <option value="">Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label for="mountStyle">Mount Style</label>
        <select id="mountStyle" name="mountStyle" required>
            <option value="">Select</option>
            <option value="Flush Mount">Flush Mount</option>
            <option value="Glued In">Glued In</option>
        </select>
        
        <label for="notes">Additional Notes</label>
        <textarea id="notes" name="notes" rows="4"></textarea>
        <button type="submit">Get a Quote</button>
      </form>

      <div class="trust">
        Licensed & Insured Services
      </div>

    </div>
  </div>

</div>

<script>
document.getElementById("leadform").addEventListener("submit", async function(e) {
  e.preventDefault();
  const formData = new FormData(this);

  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbwprWLk7cjuqWfTqJBL9jIpWweZlcu0FmKZiYjTUPDUN7W691AAsm6FUVyNzBbyxxg-/exec", {
      method: "POST",
      body: formData
    });

    if (response.ok) {
      window.location.href = "thank_you.html";
    } else {
      alert("Error submitting form. Please try again.");
    }
  } catch (error) {
    console.error(error);
    alert("Error submitting form. Please try again.");
  }
});
</script>

</body>
</html>

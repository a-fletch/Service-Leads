<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>www.ProHive.us/tree_service</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
  color: #333;
}

/* Header */
header {
  height: 400px;
  background-image: url("images/prohive_logo.png");
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  background-color: #0b141d;
}

/* Navigation */
.menu-bar {
  background-color: #0b141d;
  text-align: center;
}

.menu-bar > ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
}

.menu-bar li {
  margin: 0 18px;
}

.menu-bar a {
  text-decoration: none;
  color: white;
  font-weight: 600;
  padding: 15px 10px;
  display: block;
  transition: 0.3s ease;
}

.menu-bar a:hover {
  color: #2ab0b0;
}

/* Split Layout */
.page-container {
  display: flex;
  min-height: calc(100vh - 240px);
}

/* Image Side */
.image-side {
  flex: 1;
  background-image: url("images/tree_service.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Form Side */
.form-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 50px 40px;
  background: #ffffff;
}

/* Form Card */
.form-wrapper {
  width: 100%;
  max-width: 500px;
}

/* Headline Section */
.hero-text {
  margin-bottom: 25px;
}

.hero-text h1 {
  font-size: 1.9rem;
  margin: 0 0 10px;
  color: #0b141d;
  line-height: 1.2;
}

.hero-text p {
  font-size: 1rem;
  color: #555;
  margin: 0;
  line-height: 1.5;
}

/* Section Titles */
.form-section {
  display: block;
  text-align: left;
  font-weight: 700;
  font-size: 1.2rem;
  margin: 30px 0 15px;
  padding-bottom: 6px;
  border-bottom: 2px solid #2ab0b0;
  color: #0b141d;
}

/* Labels */
form label {
  display: block;
  margin: 16px 0 6px;
  font-weight: 500;
  font-size: 0.95rem;
  color: #0b141d;
}

/* Inputs */
form input,
form select,
form textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 1rem;
  background: #fafafa;
  transition: all 0.25s ease;
}

form input:focus,
form select:focus,
form textarea:focus {
  outline: none;
  border-color: #2ab0b0;
  box-shadow: 0 0 0 3px rgba(42,176,176,0.15);
  background: #ffffff;
}

/* Button */
form button {
  margin-top: 30px;
  width: 100%;
  padding: 15px;
  font-size: 1.1rem;
  font-weight: 600;
  background: #2ab0b0;
  color: #ffffff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
}

form button:hover {
  background: #238e8e;
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* Trust Text */
.trust {
  margin-top: 25px;
  text-align: center;
  font-size: 0.9rem;
  color: #666;
}

/* Responsive */
@media (max-width: 900px) {
  .page-container {
    flex-direction: column;
  }

  .image-side {
    height: 280px;
  }

  .form-side {
    padding: 40px 25px;
  }
}
</style>
</head>

<body>

<header></header>

<nav class="menu-bar">
  <ul>
    <li><a href="index.html">Home</a></li>  
    <li><a href="index.html#services">Services</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="join.html">Join Us</a></li>
  </ul>
</nav>

<div class="page-container">

  <!-- Image Column -->
  <div class="image-side"></div>

  <!-- Form Column -->
  <div class="form-side">
    <div class="form-wrapper">

      <!-- Headline & Subheadline -->
      <div class="hero-text">
        <h1>Professional Tree Services You Can Rely On</h1>
        <p>Connect with licensed tree care specialists for trimming, removal, and storm cleanup. Safe, efficient service with transparent pricing and dependable results.</p>
      </div>

      <form id="leadform">

        <label for="personalInfo" class="form-section">Contact Information:</label>
        
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required>

        <label for="email">Email</label>
        <input type="text" id="email" name="email" required>

        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" required>

        <label for="zipCode">ZIP Code</label>
        <input type="text" id="zipCode" name="zipCode" required>

        <label for="details" class="form-section">Details:</label>

        <label for="treeType">Tree Type</label>
        <select id="treeType" name="treeType" required>
            <option value="">Select</option>
            <option value="oak">Oak</option>
            <option value="pine">Pine</option>
            <option value="palm">Palm</option>
            <option value="Other">Other</option>
        </select>

        <label for="typeOfService">Type of Service</label>
        <select id="typeOfService" name="typeOfService" required>
            <option value="">Select</option>
            <option value="fullTreeRemoval">Full Tree Removal</option>
            <option value="limbRemovalOnly">Limb Removal Only</option>
            <option value="stumpGrinding">Stump Grinding</option>
        </select>

        <label for="treeHeight">Tree Height</label>
        <select id="treeHeight" name="treeHeight" required>
            <option value="">Select</option>
            <option value="under20">Under 20ft</option>
            <option value="20-40">20ft - 40ft</option>
            <option value="40-60">40ft - 60ft</option>
            <option value="over60">60+ ft</option>
        </select>

        <label for="numOfTrees">Number of Trees</label>
        <select id="numOfTrees" name="numOfTrees" required>
            <option value="">Select</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="over6">6+</option>
        </select>
        
        <label for="notes">Additional Notes</label>
        <textarea id="notes" name="notes" rows="4"></textarea>
        <button type="submit">Get a Quote</button>
      </form>

      <div class="trust">
        Licensed & Insured Services
      </div>

    </div>
  </div>

</div>

<script>
document.getElementById("leadform").addEventListener("submit", async function(e) {
  e.preventDefault();
  const formData = new FormData(this);

  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbw_KdKOSrEKeL_Lj0Adc14pBDpY4wc-TGteYdWhtq5OPf-OqxDGUJEuypv2J6y3g90XaA/exec", {
      method: "POST",
      body: formData
    });

    if (response.ok) {
      window.location.href = "thank_you.html";
    } else {
      alert("Error submitting form. Please try again.");
    }
  } catch (error) {
    console.error(error);
    alert("Error submitting form. Please try again.");
  }
});
</script>

</body>
</html>
